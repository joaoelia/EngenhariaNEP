version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aerogestor-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: aerogestor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aerogestor-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aerogestor-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aerogestor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      APP_JWT_SECRET: ${APP_JWT_SECRET:-aerogestor-super-secret-key-change-in-production-min-32-bytes-required}
      APP_JWT_EXPIRATION_MS: 86400000
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@aviationpartsinc.com.br}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-1170Avion@#}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_JPA_SHOW_SQL: "false"
    networks:
      - aerogestor-network

volumes:
  mysql_data:

networks:
  aerogestor-network:
    driver: bridge
